apiVersion: apps/v1
kind: Deployment
metadata:
  name: arc-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: arc-demo
  template:
    metadata:
      labels:
        app: arc-demo
    spec:
      containers:
        - name: arc-demo
          image: arc-demo:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: arc-demo
spec:
  selector:
    app: arc-demo
  ports:
    - name: http
      port: 8000
      targetPort: 8000
