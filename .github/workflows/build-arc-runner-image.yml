name: "Build ARC Runner Image"

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: GHCR tag for the custom runner image.
        required: true
        type: string
        default: "py-uv"
      platforms:
        description: Comma-separated target platforms for Buildx.
        required: true
        type: string
        default: "linux/amd64,linux/arm64"

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and push custom ARC runner
    runs-on: "ubuntu-latest"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare image coordinates
        id: image
        shell: bash
        env:
          INPUT_IMAGE_TAG: ${{ inputs.image_tag }}
          INPUT_PLATFORMS: ${{ inputs.platforms }}
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY#*/}"
          repo="${repo,,}"
          image="ghcr.io/${owner}/${repo}-arc-runner"
          tag="${INPUT_IMAGE_TAG:-py-uv}"
          platforms="${INPUT_PLATFORMS:-linux/amd64,linux/arm64}"

          {
            echo "image=${image}"
            echo "tag=${tag}"
            echo "platforms=${platforms}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### ARC runner image"
            echo "${image}:${tag}"
            echo ""
            echo "Platforms: ${platforms}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: arc-runner/Dockerfile
          platforms: ${{ steps.image.outputs.platforms }}
          push: true
          build-args: |
            RUNNER_VERSION=2.334.0
            PYTHON_VERSION=3.12
          tags: |
            ${{ steps.image.outputs.image }}:${{ steps.image.outputs.tag }}
            ${{ steps.image.outputs.image }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=Custom ARC runner with Python, uv, build tools, and Docker CLI
