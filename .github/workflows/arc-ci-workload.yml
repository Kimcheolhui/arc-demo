name: ARC CI Workload Test

"on":
  workflow_dispatch:
    inputs:
      job_count:
        description: Matrix job count for CI workload pressure.
        required: true
        type: choice
        default: "3"
        options:
          - "1"
          - "3"
          - "5"
          - "10"
      runner_label:
        description: ARC runner scale set label.
        required: true
        type: string
        default: arc-runner-set
      run_docker_build:
        description: Run docker build. Enable after ARC DinD mode is configured.
        required: true
        type: boolean
        default: false
      upload_artifact:
        description: Upload logs, disk snapshots, and test results.
        required: true
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  prepare-matrix:
    name: Prepare ${{ inputs.job_count }} CI jobs
    runs-on: ${{ inputs.runner_label }}
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Build matrix
        id: matrix
        shell: bash
        env:
          JOB_COUNT: ${{ inputs.job_count }}
        run: |
          matrix_json='{"include":['
          separator=""
          slot=1

          while (( slot <= JOB_COUNT )); do
            matrix_json="${matrix_json}${separator}{\"slot\":${slot}}"
            separator=","
            ((slot++))
          done

          matrix_json="${matrix_json}]}"
          printf 'matrix=%s\n' "$matrix_json" >> "$GITHUB_OUTPUT"
          echo "$matrix_json"

  ci-workload:
    name: CI workload ${{ matrix.slot }}
    needs: prepare-matrix
    runs-on: ${{ inputs.runner_label }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}
    env:
      UV_NO_PROGRESS: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Capture runner state before CI
        shell: bash
        run: |
          mkdir -p artifacts
          {
            echo "slot=${{ matrix.slot }}"
            echo "runner_name=${RUNNER_NAME}"
            echo "runner_arch=${RUNNER_ARCH}"
            echo "kernel=$(uname -a)"
            echo "machine=$(uname -m)"
            echo "nproc=$(nproc)"
            echo "python=$(command -v python)"
            python --version
            echo "pip=$(command -v pip || true)"
            python -m pip --version
            echo "uv=$(command -v uv)"
            uv --version
            echo "docker=$(command -v docker || true)"
            docker --version || true
            echo "--- memory ---"
            free -h || true
            echo "--- disk ---"
            df -h
            echo "--- workspace/cache sizes ---"
            du -sh "$GITHUB_WORKSPACE" "$HOME/.cache" "$HOME/.local/share/uv" 2>/dev/null || true
          } | tee "artifacts/runner-before-${{ matrix.slot }}.txt"

      - name: Install dependencies with uv
        shell: bash
        run: |
          { time uv sync --frozen --group dev; } 2>&1 | tee "artifacts/uv-sync-${{ matrix.slot }}.log"

      - name: Run pytest
        shell: bash
        run: |
          { time uv run pytest -q --junitxml "artifacts/pytest-${{ matrix.slot }}.xml"; } 2>&1 | tee "artifacts/pytest-${{ matrix.slot }}.log"

      - name: Create build artifact payload
        shell: bash
        run: |
          tar \
            --exclude=.git \
            --exclude=.venv \
            --exclude=artifacts \
            -czf "artifacts/arc-demo-source-${{ matrix.slot }}.tar.gz" \
            app tests pyproject.toml uv.lock Dockerfile README.md
          ls -lh artifacts

      - name: Build Docker image
        if: ${{ inputs.run_docker_build }}
        shell: bash
        run: |
          docker version
          docker info
          { time docker build --pull --tag "arc-demo:${GITHUB_SHA}-${{ matrix.slot }}" .; } 2>&1 | tee "artifacts/docker-build-${{ matrix.slot }}.log"

      - name: Capture runner state after CI
        if: ${{ always() }}
        shell: bash
        run: |
          mkdir -p artifacts
          {
            echo "slot=${{ matrix.slot }}"
            echo "--- memory ---"
            free -h || true
            echo "--- disk ---"
            df -h
            echo "--- workspace/cache sizes ---"
            du -sh "$GITHUB_WORKSPACE" "$GITHUB_WORKSPACE/.venv" "$HOME/.cache" "$HOME/.local/share/uv" 2>/dev/null || true
          } | tee "artifacts/runner-after-${{ matrix.slot }}.txt"

      - name: Upload CI workload artifacts
        if: ${{ always() && inputs.upload_artifact }}
        uses: actions/upload-artifact@v4
        with:
          name: arc-ci-workload-${{ matrix.slot }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 7
