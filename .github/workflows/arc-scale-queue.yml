name: ARC Scale Queue Test

# Tune minRunners/maxRunners in Helm values before running this workflow.
# Set job_count higher than maxRunners to make queued jobs and pod scaling visible.
# strategy.max-parallel is intentionally omitted so all matrix jobs request runners at once.
"on":
  workflow_dispatch:
    inputs:
      job_count:
        description: Matrix job count. Set this higher than maxRunners to build a queue.
        required: true
        type: choice
        default: "10"
        options:
          - "5"
          - "10"
          - "15"
          - "20"
      hold_minutes:
        description: Minutes each runner pod stays busy.
        required: true
        type: choice
        default: "1"
        options:
          - "1"
          - "3"
          - "5"
          - "10"
          - "15"
      runner_label:
        description: ARC runner scale set label.
        required: true
        type: string
        default: arc-runner-set

permissions:
  contents: read

jobs:
  prepare-matrix:
    name: Prepare ${{ inputs.job_count }} jobs
    runs-on: ${{ inputs.runner_label }}
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Build matrix
        id: matrix
        shell: bash
        env:
          JOB_COUNT: ${{ inputs.job_count }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os

          job_count = int(os.environ["JOB_COUNT"])
          matrix = {"include": [{"slot": slot} for slot in range(1, job_count + 1)]}
          print(f"matrix={json.dumps(matrix)}")
          PY

  hold-runner:
    name: Hold ARC runner ${{ matrix.slot }}
    needs: prepare-matrix
    runs-on: ${{ inputs.runner_label }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}
    steps:
      - name: Show scale test settings
        shell: bash
        run: |
          echo "runner_label=${{ inputs.runner_label }}"
          echo "job_count=${{ inputs.job_count }}"
          echo "hold_minutes=${{ inputs.hold_minutes }}"
          echo "matrix_slot=${{ matrix.slot }}"
          echo "For queue buildup, set maxRunners lower than job_count."

      - name: Keep runner pod busy
        shell: bash
        env:
          HOLD_MINUTES: ${{ inputs.hold_minutes }}
          MATRIX_SLOT: ${{ matrix.slot }}
        run: |
          hold_seconds=$((HOLD_MINUTES * 60))
          end_at=$((SECONDS + hold_seconds))

          while (( SECONDS < end_at )); do
            remaining=$((end_at - SECONDS))
            echo "slot ${MATRIX_SLOT}: holding runner for ${remaining}s more"
            sleep 30
          done

          echo "slot ${MATRIX_SLOT}: done"
